<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badminton Club Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    :root {
      --bg1: #06141f;
      --bg2: #0c2233;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: #c7d3e0;
      --accent: #00e5ff;
      --accent2: #7c4dff;
      --success: #3ddc97;
      --danger: #ff6b6b;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top left, #12324a 0%, #07111a 35%, #03070b 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated background glow blobs */
    .bg-blur {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: floatBlob 12s ease-in-out infinite;
      pointer-events: none;
    }

    .blob1 {
      width: 280px;
      height: 280px;
      background: #00e5ff;
      top: 8%;
      left: 8%;
    }

    .blob2 {
      width: 340px;
      height: 340px;
      background: #7c4dff;
      bottom: 8%;
      right: 8%;
      animation-delay: 2s;
    }

    .blob3 {
      width: 220px;
      height: 220px;
      background: #00c853;
      top: 55%;
      left: 18%;
      animation-delay: 4s;
    }

    @keyframes floatBlob {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      25% {
        transform: translate(30px, -25px) scale(1.05);
      }
      50% {
        transform: translate(-20px, 20px) scale(0.95);
      }
      75% {
        transform: translate(20px, 10px) scale(1.02);
      }
    }

    /* subtle grid lines */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 90%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 460px;
      padding: 24px;
      position: relative;
      z-index: 2;
      animation: fadeUp 1s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 36px 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0,229,255,0.8), rgba(124,77,255,0.7), rgba(255,255,255,0.15));
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .shine {
      position: absolute;
      top: -120%;
      left: -40%;
      width: 60%;
      height: 300%;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(255,255,255,0.07) 45%,
        rgba(255,255,255,0.18) 50%,
        rgba(255,255,255,0.07) 55%,
        transparent 100%
      );
      transform: rotate(25deg);
      animation: shineMove 6s linear infinite;
      pointer-events: none;
    }

    @keyframes shineMove {
      0% { left: -60%; }
      100% { left: 140%; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      color: #dffaff;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 18px;
      animation: softPulse 3s infinite ease-in-out;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    @keyframes softPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    h1 {
      font-size: 32px;
      line-height: 1.1;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .highlight {
      background: linear-gradient(90deg, #00e5ff, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #ebf4ff;
      margin-bottom: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 56px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      outline: none;
      padding: 0 18px;
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 15px;
      transition: 0.35s ease;
      box-shadow: inset 0 0 0 rgba(0,0,0,0);
    }

    .input-wrap input::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .input-wrap input:focus {
      border-color: rgba(0,229,255,0.7);
      background: rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 4px rgba(0,229,255,0.12),
        0 0 20px rgba(0,229,255,0.08);
      transform: translateY(-1px);
    }

    .input-glow {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      pointer-events: none;
      opacity: 0;
      transition: 0.35s ease;
      background: linear-gradient(135deg, rgba(0,229,255,0.18), rgba(124,77,255,0.12));
      filter: blur(12px);
    }

    .input-wrap:focus-within .input-glow {
      opacity: 1;
    }

    .register-btn {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 30px rgba(0, 229, 255, 0.25);
      transition: 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .register-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 120%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: 0.7s;
    }

    .register-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 18px 40px rgba(124, 77, 255, 0.28);
    }

    .register-btn:hover::before {
      left: 120%;
    }

    .register-btn:active {
      transform: scale(0.99);
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      min-height: 20px;
      transition: 0.3s ease;
    }

    .success {
      color: var(--success);
      text-shadow: 0 0 12px rgba(61,220,151,0.25);
    }

    .error {
      color: var(--danger);
      text-shadow: 0 0 12px rgba(255,107,107,0.2);
    }

    .footer-text {
      margin-top: 22px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    /* floating particles */
    .particles span {
      position: absolute;
      display: block;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      animation: particleFloat linear infinite;
      bottom: -100px;
    }

    .particles span:nth-child(1) {
      left: 10%;
      width: 5px;
      height: 5px;
      animation-duration: 13s;
    }

    .particles span:nth-child(2) {
      left: 25%;
      width: 8px;
      height: 8px;
      animation-duration: 16s;
      animation-delay: 2s;
    }

    .particles span:nth-child(3) {
      left: 40%;
      width: 6px;
      height: 6px;
      animation-duration: 10s;
      animation-delay: 1s;
    }

    .particles span:nth-child(4) {
      left: 60%;
      width: 10px;
      height: 10px;
      animation-duration: 15s;
      animation-delay: 3s;
    }

    .particles span:nth-child(5) {
      left: 75%;
      width: 7px;
      height: 7px;
      animation-duration: 12s;
      animation-delay: 2s;
    }

    .particles span:nth-child(6) {
      left: 90%;
      width: 5px;
      height: 5px;
      animation-duration: 18s;
      animation-delay: 4s;
    }

    @keyframes particleFloat {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(0.2);
        opacity: 0;
      }
    }

    @media (max-width: 520px) {
      .container {
        padding: 16px;
      }

      .card {
        padding: 28px 20px;
        border-radius: 22px;
      }

      h1 {
        font-size: 26px;
      }

      .subtitle {
        font-size: 13px;
      }
    }
    .logo-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
}

.logo {
  width: 90px;
  height: 90px;
  object-fit: contain;
  border-radius: 50%;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow:
    0 0 20px rgba(0,229,255,0.25),
    0 0 40px rgba(124,77,255,0.15);
  transition: 0.4s ease;
}
  </style>
</head>
<body>
  <div class="bg-blur blob1"></div>
  <div class="bg-blur blob2"></div>
  <div class="bg-blur blob3"></div>
  <div class="grid-overlay"></div>

  <div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="container">
    <div class="card">
      <div class="shine"></div>
    <div class="logo-wrap">
  <img src="Dklogo.jpeg" alt="Club Logo" class="logo">
</div>
      <div class="badge">
        <span class="badge-dot"></span>
        DK'S BADMINTON CLUB
      </div>

      <h1>Player <span class="highlight">Registration</span></h1>
      <p class="subtitle">
        Join Tournament By Filling In Your Details Below.
      </p>

      <form id="regForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <div class="input-wrap">
            <input type="text" id="name" name="name" placeholder="Enter your full name" required />
            <div class="input-glow"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <div class="input-wrap">
            <input type="date" id="dob" name="dob" required />
            <div class="input-glow"></div>
          </div>
        </div>

        <button type="submit" class="register-btn">Register Now</button>
      </form>

      <div id="message" class="message"></div>

      <div class="footer-text">
        Built for DK'S BADMINTON CLUB
      </div>
    </div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwzQ74RWgjRYgWSWhVEl7PNmmRM96ypLJwsa8ds_0iabytblz6kPT3tcQxYq8V2QT55/exec";

    const form = document.getElementById("regForm");
    const message = document.getElementById("message");
    const button = document.querySelector(".register-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      message.textContent = "Submitting registration...";
      message.className = "message";
      button.disabled = true;
      button.textContent = "Please wait...";

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          message.textContent = "Registration successful!";
          message.className = "message success";
          form.reset();
        } else {
          message.textContent = data.message || "Submission failed.";
          message.className = "message error";
        }
      } catch (error) {
        message.textContent = "Something went wrong. Please try again.";
        message.className = "message error";
      }

      button.disabled = false;
      button.textContent = "Register Now";
    });

  </script>
</body>
</html>
